<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyle Ronhard - Dashboard Profesional</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles.css">

    <!-- Firebase -->
    <script type="module" src="script.js"></script>
</head>

<body>

<!-- 🔐 LOGIN OVERLAY -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2>Acceso Seguro</h2>

        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Contraseña">

        <button id="loginBtn">Iniciar sesión</button>

        <p id="loginError"></p>
    </div>
</div>

<!-- 👤 USER BAR -->
<div id="userBar" class="access-lock-banner" style="display:none;">
    <i class='bx bxs-user'></i>
    <span id="userEmail">Usuario</span>

    <button onclick="logoutUser()"
        style="margin-left:10px;background:#ff4d4d;border:none;padding:6px 12px;color:#fff;border-radius:6px;cursor:pointer;">
        Logout
    </button>
</div>

<!-- ⚠️ ACCESS BANNER -->
<div id="accessLockBanner" class="access-lock-banner">
    <i class='bx bxs-error-circle'></i>
    <span id="accessLockBannerText">Acceso restringido temporalmente.</span>
</div>

<!-- NAV -->
<nav class="menu">
    <ul>
        <li class="nav-item active" data-section="dashboard">
            <i class='bx bx-grid-alt'></i><span>DASHBOARD</span>
        </li>
        <li class="nav-item" data-section="laboral">
            <i class='bx bx-briefcase'></i><span>LABORAL</span>
        </li>
        <li class="nav-item" data-section="finanzas">
            <i class='bx bx-bar-chart-alt-2'></i><span>FINANZAS</span>
        </li>
        <li class="nav-item" data-section="contacto">
            <i class='bx bx-envelope'></i><span>CONTACTO</span>
        </li>
    </ul>
</nav>

<main class="content">

<!-- ================= DASHBOARD ================= -->
<section id="dashboard" class="section active">

    <div class="dashboard-container">

        <div class="profile-section">

            <div class="presentation-card-left">
                <div class="photo-container">
                    <img src="FOTOS/IMG_1147.JPG" class="photo">
                </div>

                <div class="name-badge">
                    <h1 class="name">KYLE RONHARD BENTER PIMENTEL</h1>

                    <div class="info-badges">
                        <div class="info-item"><i class='bx bx-cake'></i><span>23 años</span></div>
                        <div class="info-item"><i class='bx bx-briefcase'></i><span>Chalito Collblanc</span></div>
                        <div class="info-item"><i class='bx bx-map'></i><span>Barcelona</span></div>
                    </div>
                </div>
            </div>

            <!-- métricas bloqueadas por PIN -->
            <div class="presentation-card-right">

                <div class="personal-metrics">

                    <div class="metric-small censored" onclick="checkPassword('ingresos')">
                        <i class='bx bx-line-chart'></i>
                        <span>Ingresos Mes</span>
                        <small id="dashIncomeMonth">*****</small>
                    </div>

                    <div class="metric-small censored" onclick="checkPassword('gastos')">
                        <i class='bx bx-money'></i>
                        <span>Gastos Mes</span>
                        <small>*****</small>
                    </div>

                    <div class="metric-small censored" onclick="checkPassword('saldo')">
                        <i class='bx bx-lock-alt'></i>
                        <span>Saldo</span>
                        <small>*****</small>
                    </div>

                    <div class="metric-small censored" onclick="checkPassword('dia')">
                        <i class='bx bx-time'></i>
                        <span>Gasto Día</span>
                        <small>*****</small>
                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- ================= LABORAL ================= -->
<section id="laboral" class="section">

    <h1>CV y Documentos</h1>

    <button onclick="checkPassword('docs')" class="btn">
        Acceder documentos (PIN)
    </button>

</section>

<!-- ================= FINANZAS ================= -->
<section id="finanzas" class="section">

    <h1>Finanzas</h1>

    <form id="incomeForm">

        <input type="date" id="incomeDate" required>
        <input type="text" id="incomeConcept" placeholder="Concepto" required>

        <select id="incomeType">
            <option value="Ingreso">Ingreso</option>
            <option value="Gasto">Gasto</option>
        </select>

        <input type="number" id="incomeAmount" placeholder="Cantidad" required>

        <button type="submit">Guardar</button>

    </form>

</section>

<!-- ================= CONTACTO ================= -->
<section id="contacto" class="section">
    <h1>Contacto</h1>
</section>

</main>

<!-- ================= PIN MODAL ================= -->
<div id="passwordModal" class="password-modal">

    <div class="modal-content">

        <h3>PIN de Seguridad</h3>

        <input type="password" id="pinInput" placeholder="Introduce PIN">

        <p id="pinMessage"></p>

        <button onclick="verifyPin()">Verificar</button>
        <button onclick="closeModal()">Cancelar</button>

    </div>

</div>

</body>
</html>
