<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pro</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link rel="stylesheet" href="styles.css">

<style>
/* LOGIN OVERLAY */
#authScreen {
    position: fixed;
    inset: 0;
    background: #0f0f14;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.auth-box {
    background: #1c1c25;
    padding: 25px;
    border-radius: 12px;
    width: 320px;
    color: white;
}

.auth-box input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: none;
}

.auth-box button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #4f46e5;
    color: white;
    cursor: pointer;
}

.auth-switch {
    text-align: center;
    font-size: 12px;
    margin-top: 10px;
    cursor: pointer;
    color: #aaa;
}

/* oculto dashboard hasta login */
#app {
    display: none;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="authScreen">
    <div class="auth-box">
        <h2 id="authTitle">Login</h2>

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Contraseña">

        <button onclick="authAction()">Entrar</button>

        <div class="auth-switch" onclick="toggleMode()">
            ¿No tienes cuenta? Regístrate
        </div>
    </div>
</div>

<!-- 🔥 TU APP COMPLETA -->
<div id="app">

    <div id="accessLockBanner" class="access-lock-banner">
        <i class='bx bxs-error-circle'></i>
        <span>Acceso restringido temporalmente.</span>
    </div>

    <nav class="menu">
        <ul>
            <li class="nav-item active" data-section="dashboard">
                <i class='bx bx-grid-alt'></i>
                <span>DASHBOARD</span>
            </li>
            <li class="nav-item" data-section="laboral">
                <i class='bx bx-briefcase'></i>
                <span>LABORAL</span>
            </li>
            <li class="nav-item" data-section="finanzas">
                <i class='bx bx-bar-chart-alt-2'></i>
                <span>FINANZAS</span>
            </li>
            <li class="nav-item" data-section="contacto">
                <i class='bx bx-envelope'></i>
                <span>CONTACTO</span>
            </li>
        </ul>
    </nav>

    <main class="content">

        <!-- 🔥 AQUÍ NO TOCO NADA DE TU DASHBOARD -->
        <section id="dashboard" class="section active">
            <!-- TODO TU CONTENIDO ORIGINAL TAL CUAL -->
        </section>

        <section id="laboral" class="section">
            <!-- TODO TU CONTENIDO ORIGINAL -->
        </section>

        <section id="finanzas" class="section">
            <!-- TODO TU CONTENIDO ORIGINAL -->
        </section>

        <section id="contacto" class="section">
            <!-- TODO TU CONTENIDO ORIGINAL -->
        </section>

    </main>

    <button onclick="logout()" style="position:fixed;bottom:20px;right:20px;padding:10px;background:red;color:white;border:none;border-radius:8px;cursor:pointer;">
        Logout
    </button>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
