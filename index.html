<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinTech OS - Dashboard Financiero Futurista</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="app" id="app-container" style="display:none;">
    <header class="header">
      <div class="logo"><span class="emoji-pulse" style="display:inline-block;">◈</span> FIN<span>TECH</span> OS</div>

      <!-- Desktop nav -->
      <nav class="nav-tabs desktop-nav" id="main-nav">
        <button class="nav-tab active" onclick="showPage('dashboard')"><span class="emoji-animated">📊</span> Dashboard</button>
        <button class="nav-tab" onclick="showPage('registros')"><span class="emoji-animated">📝</span> Registros</button>
        <button class="nav-tab" onclick="showPage('programables')"><span class="emoji-animated">⏰</span> Programables</button>
        <button class="nav-tab" onclick="showPage('metas')"><span class="emoji-animated">🎯</span> Metas</button>
        <button class="nav-tab" onclick="showPage('divisas')"><span class="emoji-animated">💱</span> Divisas</button>
        <button class="nav-tab" onclick="showPage('configuracion')"><span class="emoji-animated">⚙️</span> Config</button>
      </nav>

      <!-- User profile with avatar upload -->
      <div class="user-profile" id="user-profile">
        <div class="avatar-wrapper" onclick="openAvatarModal()" title="Cambiar foto de perfil">
          <img class="user-avatar-img" id="user-avatar-img" src="" alt="Avatar" style="display:none;">
          <div class="user-avatar" id="user-avatar">U</div>
          <div class="avatar-overlay">📷</div>
        </div>
        <div class="user-info">
          <div class="user-name" id="user-name">Usuario</div>
          <button class="logout-btn desktop-only" onclick="logout()">🚪 Salir</button>
        </div>
      </div>

      <!-- Mobile hamburger menu -->
      <div class="mobile-menu-wrapper">
        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleMobileMenu()" aria-label="Menú">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="mobile-nav" id="mobile-nav">
          <button class="mobile-nav-item active" onclick="showPage('dashboard'); toggleMobileMenu()"><span class="emoji-animated">📊</span> Dashboard</button>
          <button class="mobile-nav-item" onclick="showPage('registros'); toggleMobileMenu()"><span class="emoji-animated">📝</span> Registros</button>
          <button class="mobile-nav-item" onclick="showPage('programables'); toggleMobileMenu()"><span class="emoji-animated">⏰</span> Programables</button>
          <button class="mobile-nav-item" onclick="showPage('metas'); toggleMobileMenu()"><span class="emoji-animated">🎯</span> Metas</button>
          <button class="mobile-nav-item" onclick="showPage('divisas'); toggleMobileMenu()"><span class="emoji-animated">💱</span> Divisas</button>
          <button class="mobile-nav-item" onclick="showPage('configuracion'); toggleMobileMenu()"><span class="emoji-animated">⚙️</span> Configuración</button>
          <div class="mobile-nav-divider"></div>
          <button class="mobile-nav-item logout" onclick="logout(); toggleMobileMenu()">🚪 Cerrar Sesión</button>
        </nav>
      </div>
    </header>

    <!-- CONTENIDO DINÁMICO -->
    <main id="main-content"></main>

    <!-- EDIT GOAL MODAL -->
    <div class="modal-overlay" id="edit-modal" style="display:none;" onclick="closeEditModalOnOverlay(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h3 class="modal-title" data-i18n="edit_goal">✏️ Editar Meta</h3>
        <input type="hidden" id="edit-meta-id">
        <div class="form-group" style="margin-bottom: 12px;">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-input" id="edit-meta-nombre">
        </div>
        <div class="form-group" style="margin-bottom: 12px;">
          <label class="form-label">Monto Objetivo</label>
          <input type="number" class="form-input" id="edit-meta-objetivo" step="0.01">
        </div>
        <div class="form-group" style="margin-bottom: 12px;">
          <label class="form-label">Monto Actual</label>
          <input type="number" class="form-input" id="edit-meta-actual" step="0.01">
        </div>
        <div class="form-group" style="margin-bottom: 20px;">
          <label class="form-label">Color</label>
          <div class="color-picker" id="edit-color-picker">
            <div class="color-option" style="background:#00d4ff" data-color="#00d4ff" onclick="selectEditColor(this)"></div>
            <div class="color-option" style="background:#a855f7" data-color="#a855f7" onclick="selectEditColor(this)"></div>
            <div class="color-option" style="background:#00ff88" data-color="#00ff88" onclick="selectEditColor(this)"></div>
            <div class="color-option" style="background:#f59e0b" data-color="#f59e0b" onclick="selectEditColor(this)"></div>
            <div class="color-option" style="background:#ff3366" data-color="#ff3366" onclick="selectEditColor(this)"></div>
            <div class="color-option" style="background:#6366f1" data-color="#6366f1" onclick="selectEditColor(this)"></div>
            <div class="color-option" style="background:#ec4899" data-color="#ec4899" onclick="selectEditColor(this)"></div>
            <div class="color-option" style="background:#14b8a6" data-color="#14b8a6" onclick="selectEditColor(this)"></div>
          </div>
          <input type="hidden" id="edit-meta-color" value="#00d4ff">
        </div>
        <div style="display:flex;gap:12px;">
          <button class="btn btn-primary" style="flex:1;" onclick="saveEditGoal()" data-i18n="save">💾 Guardar</button>
          <button class="btn" style="background:rgba(100,116,139,0.2);color:var(--text-secondary);flex:1;" onclick="closeEditModal()" data-i18n="cancel">❌ Cancelar</button>
        </div>
      </div>
    </div>

    <!-- AVATAR UPLOAD MODAL -->
    <div class="modal-overlay" id="avatar-modal" style="display:none;" onclick="closeAvatarModalOnOverlay(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h3 class="modal-title" data-i18n="avatar_title">📷 Foto de Perfil</h3>
        <div style="text-align:center; margin-bottom: 20px;">
          <div id="avatar-preview" style="width:120px;height:120px;border-radius:50%;background:var(--bg-tertiary);border:3px solid var(--border-medium);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;overflow:hidden;">
            <img id="avatar-preview-img" src="" style="width:100%;height:100%;object-fit:cover;display:none;">
            <span id="avatar-preview-text" style="font-family:'Orbitron';font-size:40px;font-weight:700;color:var(--accent);">U</span>
          </div>
          <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px;" data-i18n="max_10mb">Máximo 10 MB • JPG, PNG, WEBP</p>
          <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/webp" style="display:none;" onchange="handleAvatarSelect(event)">
          <button class="btn btn-primary" onclick="document.getElementById('avatar-input').click()" style="width:100%;margin-bottom:8px;">
            📁 Seleccionar Foto
          </button>
          <p id="avatar-error" style="color:var(--negative);font-size:12px;margin-top:8px;display:none;"></p>
        </div>
        <div style="display:flex;gap:12px;">
          <button class="btn btn-primary" style="flex:1;" onclick="saveAvatar()" id="avatar-save-btn" disabled data-i18n="save_avatar">💾 Guardar</button>
          <button class="btn" style="background:rgba(100,116,139,0.2);color:var(--text-secondary);flex:1;" onclick="closeAvatarModal()">❌ Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    // ===== FIREBASE IMPORTS =====
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, set, get } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, updatePassword, reauthenticateWithCredential, EmailAuthProvider, deleteUser } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDmOVgHXXhLAp59JFI0UolZTW9pWyYZuoA",
      authDomain: "finanzas-pagina.firebaseapp.com",
      databaseURL: "https://finanzas-pagina-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "finanzas-pagina",
      storageBucket: "finanzas-pagina.firebasestorage.app",
      messagingSenderId: "138404823610",
      appId: "1:138404823610:web:e404ba1b91c02c71d56b03"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // ===== EXPORTS GLOBALES =====
    window.db = db;
    window.auth = auth;
    window.app = app;

    // ... (resto del script compartido)
  </script>
</body>
</html>
