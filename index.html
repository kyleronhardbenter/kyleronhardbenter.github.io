<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyle Ronhard - Dashboard Profesional</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ================= AUTH LOGIN ================= -->
<div id="authOverlay" class="auth-overlay">
    <div class="auth-box">

        <h2>Acceso al Dashboard</h2>

        <input type="email" id="authEmail" placeholder="Correo">
        <input type="password" id="authPassword" placeholder="Contraseña">

        <div class="auth-buttons">
            <button onclick="loginUser(
                document.getElementById('authEmail').value,
                document.getElementById('authPassword').value
            )">
                Iniciar sesión
            </button>

            <button onclick="registerUser(
                document.getElementById('authEmail').value,
                document.getElementById('authPassword').value
            )">
                Registrarse
            </button>
        </div>

        <p id="authError"></p>
    </div>
</div>

<!-- ================= PIN MODAL ================= -->
<div id="passwordModal" class="password-modal">
    <div class="modal-content">

        <h3>🔒 PIN de Seguridad</h3>

        <input type="password" id="pinInput" placeholder="Introduce PIN">

        <p id="pinMessage"></p>

        <div class="modal-actions">
            <button onclick="verifyPin()">Verificar</button>
            <button onclick="closeModal()">Cancelar</button>
        </div>

    </div>
</div>

<!-- ================= MENU ================= -->
<nav class="menu">
    <ul>
        <li class="nav-item active" data-section="dashboard">
            <i class='bx bx-grid-alt'></i><span>DASHBOARD</span>
        </li>

        <li class="nav-item" data-section="laboral">
            <i class='bx bx-briefcase'></i><span>LABORAL</span>
        </li>

        <li class="nav-item" data-section="finanzas">
            <i class='bx bx-bar-chart-alt-2'></i><span>FINANZAS</span>
        </li>

        <li class="nav-item" data-section="contacto">
            <i class='bx bx-envelope'></i><span>CONTACTO</span>
        </li>
    </ul>
</nav>

<!-- ================= CONTENT ================= -->
<main class="content">

<!-- DASHBOARD -->
<section id="dashboard" class="section active">

    <div class="dashboard-container">

        <div class="profile-section">

            <div class="presentation-card-left">

                <div class="photo-container">
                    <img src="FOTOS/IMG_1147.JPG" class="photo">
                </div>

                <h1 class="name">KYLE RONHARD BENTER PIMENTEL</h1>

            </div>

            <div class="presentation-card-right">

                <div class="personal-metrics">

                    <div class="metric-small censored" onclick="checkPassword('ingresos')">
                        <span>Ingresos Mes</span>
                        <small id="dashIncomeMonth">*****</small>
                    </div>

                    <div class="metric-small censored" onclick="checkPassword('gastosmes')">
                        <span>Gastos Mes</span>
                        <small id="dashExpenseMonth">*****</small>
                    </div>

                    <div class="metric-small censored" onclick="checkPassword('saldo')">
                        <span>Saldo</span>
                        <small id="dashBalanceLocked">*****</small>
                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- LABORAL -->
<section id="laboral" class="section">
    <h1>CV y Documentos</h1>

    <div class="doc-card">
        <h3>Curriculum</h3>
        <input type="file" id="fileInput-curriculum">
    </div>

</section>

<!-- FINANZAS -->
<section id="finanzas" class="section">

    <h1>Finanzas</h1>

    <form id="incomeForm">

        <input type="date" id="incomeDate">
        <input type="text" id="incomeConcept" placeholder="Concepto">

        <select id="incomeType">
            <option>Ingreso</option>
            <option>Gasto</option>
        </select>

        <input type="number" id="incomeAmount" placeholder="Monto">

        <button type="submit">Guardar</button>

    </form>

    <table>
        <tbody id="incomeTableBody"></tbody>
    </table>

</section>

<!-- CONTACTO -->
<section id="contacto" class="section">

    <h1>Contacto</h1>

    <form id="contactForm">
        <input type="text" id="contactName" placeholder="Nombre">
        <input type="email" id="contactEmail" placeholder="Email">
        <textarea id="contactMessage"></textarea>
        <button type="submit">Enviar</button>
    </form>

</section>

</main>

<!-- ================= SCRIPT ================= -->
<script type="module" src="script.js"></script>

</body>
</html>
