<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chalito Collblanc - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#FF6B00; --primary-light:#FFF0E0; --secondary:#1a1a2e; --accent:#00C853; --danger:#FF1744; --bg:#f8f9fa; --card:#ffffff; --text:#2d3436; --text-light:#636e72; --border:#e9ecef; --shadow:0 4px 20px rgba(0,0,0,0.08); --shadow-lg:0 10px 40px rgba(0,0,0,0.12); --radius:16px; --radius-sm:10px; }
    * { margin:0; padding:0; box-sizing:border-box }
    body { font-family:'Inter',sans-serif; background:linear-gradient(135deg,var(--secondary) 0%,#2d2d44 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px }
    .auth-card { background:var(--card); border-radius:var(--radius); padding:48px 40px; width:100%; max-width:420px; box-shadow:var(--shadow-lg); text-align:center; animation:slideUp .5s ease }
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    .auth-logo { width:80px; height:80px; background:var(--primary-light); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:40px; margin:0 auto 24px }
    .auth-title { font-size:24px; font-weight:700; color:var(--secondary); margin-bottom:8px }
    .auth-subtitle { font-size:14px; color:var(--text-light); margin-bottom:32px }
    .auth-input { width:100%; padding:14px 18px; border:2px solid var(--border); border-radius:var(--radius-sm); font-family:inherit; font-size:15px; margin-bottom:14px; transition:all .2s }
    .auth-input:focus { outline:none; border-color:var(--primary) }
    .auth-input.error { border-color:var(--danger); background:#FFEBEE }
    .auth-btn { width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:var(--radius-sm); font-family:inherit; font-size:15px; font-weight:600; cursor:pointer; transition:all .2s; margin-top:8px }
    .auth-btn:hover { background:#E65C00 }
    .auth-btn:disabled { opacity:.6; cursor:not-allowed }
    .auth-divider { display:flex; align-items:center; gap:12px; margin:24px 0; color:var(--text-light); font-size:13px }
    .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:var(--border) }
    .auth-google { width:100%; padding:12px; background:white; border:2px solid var(--border); border-radius:var(--radius-sm); font-family:inherit; font-size:14px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:all .2s }
    .auth-google:hover { border-color:var(--primary); background:var(--primary-light) }
    .auth-google:disabled { opacity:.5; cursor:not-allowed }
    .auth-toggle { margin-top:20px; font-size:13px; color:var(--text-light) }
    .auth-toggle a { color:var(--primary); font-weight:600; cursor:pointer }
    .error-msg { color:var(--danger); font-size:13px; margin-top:-8px; margin-bottom:12px; text-align:left; display:none }
    .error-msg.visible { display:block }
    .toast-container { position:fixed; top:24px; right:24px; z-index:300; display:flex; flex-direction:column; gap:10px }
    .toast { background:var(--secondary); color:white; padding:14px 20px; border-radius:var(--radius-sm); box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:10px; font-size:14px; animation:slideInRight .3s ease; max-width:360px }
    .toast.success { background:var(--accent) }
    .toast.error { background:var(--danger) }
    @keyframes slideInRight { from{opacity:0;transform:translateX(100px)} to{opacity:1;transform:translateX(0)} }
    .loading-overlay { position:fixed; inset:0; background:rgba(255,255,255,0.9); display:none; align-items:center; justify-content:center; z-index:400; flex-direction:column; gap:16px }
    .loading-overlay.active { display:flex }
    .spinner { width:48px; height:48px; border:4px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 1s linear infinite }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">🏪</div>
    <div class="auth-title">Chalito Collblanc</div>
    <div class="auth-subtitle">Gestion de empleados</div>
    <input type="email" class="auth-input" id="authEmail" placeholder="Correo electronico">
    <div class="error-msg" id="emailError">Correo invalido</div>
    <input type="password" class="auth-input" id="authPassword" placeholder="Contrasena (minimo 6 caracteres)">
    <div class="error-msg" id="passwordError">Contrasena muy corta</div>
    <button class="auth-btn" id="authBtn">Iniciar sesion</button>
    <div class="auth-divider">o</div>
    <button class="auth-google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuar con Google
    </button>
    <div class="auth-toggle">
      <span id="authToggleText">¿No tienes cuenta?</span>
      <a id="authToggleLink">Registrate</a>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div style="color:var(--text-light);font-size:14px;">Cargando...</div></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = { apiKey:"AIzaSyAapba1gadT0M7ZjnEOIcg4Gj2SPE0HoJU", authDomain:"chalito-collblanc.firebaseapp.com", projectId:"chalito-collblanc", storageBucket:"chalito-collblanc.firebasestorage.app", messagingSenderId:"654415271839", appId:"1:654415271839:web:3bbabebca91415e8d00faa" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();
    let isAuthMode = 'login';
    let isProcessing = false;

    document.getElementById('authToggleLink').addEventListener('click', () => {
      isAuthMode = isAuthMode === 'login' ? 'register' : 'login';
      document.getElementById('authBtn').textContent = isAuthMode === 'login' ? 'Iniciar sesion' : 'Crear cuenta';
      document.getElementById('authToggleText').textContent = isAuthMode === 'login' ? '¿No tienes cuenta?' : '¿Ya tienes cuenta?';
      document.getElementById('authToggleLink').textContent = isAuthMode === 'login' ? 'Registrate' : 'Inicia sesion';
      clearErrors();
    });

    document.getElementById('authBtn').addEventListener('click', async () => {
      if (isProcessing) return;
      clearErrors();

      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;

      if (!email) { showFieldError('emailError', 'Introduce un correo electronico'); return; }
      if (!password) { showFieldError('passwordError', 'Introduce una contrasena'); return; }
      if (password.length < 6 && isAuthMode === 'register') { showFieldError('passwordError', 'Minimo 6 caracteres'); return; }

      isProcessing = true;
      const btn = document.getElementById('authBtn');
      btn.disabled = true;
      btn.textContent = 'Cargando...';
      showLoading(true);

      try {
        if (isAuthMode === 'login') {
          await signInWithEmailAndPassword(auth, email, password);
          // onAuthStateChanged handles redirect
        } else {
          const cred = await createUserWithEmailAndPassword(auth, email, password);
          // Create user profile immediately
          try {
            await setDoc(doc(db, 'usuarios', cred.user.uid), { 
              email: cred.user.email, 
              nombre: cred.user.email.split('@')[0], 
              rol: 'empleado', 
              creado: serverTimestamp(), 
              fcmToken: null 
            });
            showToast('Cuenta creada correctamente', 'success');
          } catch (dbErr) {
            console.error('Error creating profile:', dbErr);
            showToast('Cuenta creada pero error guardando perfil: ' + dbErr.message, 'error');
          }
        }
      } catch (err) {
        console.error('Auth error:', err.code, err.message);
        showToast(traducirError(err.code), 'error');
        btn.disabled = false;
        btn.textContent = isAuthMode === 'login' ? 'Iniciar sesion' : 'Crear cuenta';
        isProcessing = false;
        showLoading(false);
      }
    });

    document.getElementById('googleBtn').addEventListener('click', async () => {
      if (isProcessing) return;
      isProcessing = true;
      const btn = document.getElementById('googleBtn');
      btn.disabled = true;
      showLoading(true);

      try { 
        const cred = await signInWithPopup(auth, googleProvider); 
        const userRef = doc(db, 'usuarios', cred.user.uid); 
        const userSnap = await getDoc(userRef); 
        if (!userSnap.exists()) { 
          await setDoc(userRef, { 
            email: cred.user.email, 
            nombre: cred.user.displayName || cred.user.email.split('@')[0], 
            rol: 'empleado', 
            creado: serverTimestamp(), 
            fcmToken: null 
          }); 
        } 
      } catch (err) { 
        console.error('Google auth error:', err.code, err.message);
        showToast(traducirError(err.code), 'error'); 
        btn.disabled = false;
        isProcessing = false;
        showLoading(false);
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) { 
        showLoading(false); 
        isProcessing = false;
        return; 
      }
      showLoading(true);
      try {
        const userRef = doc(db, 'usuarios', user.uid); 
        const userSnap = await getDoc(userRef); 
        const profile = userSnap.exists() ? userSnap.data() : { rol: 'empleado' }; 
        if (profile.rol === 'admin') window.location.href = 'admin.html'; 
        else window.location.href = 'dashboard.html'; 
      } catch (err) {
        console.error('Error loading profile:', err);
        showToast('Error cargando perfil: ' + err.message, 'error');
        showLoading(false);
        isProcessing = false;
      }
    });

    function traducirError(code) { 
      const e = { 
        'auth/invalid-email':'Correo invalido',
        'auth/user-disabled':'Cuenta deshabilitada',
        'auth/user-not-found':'Usuario no encontrado',
        'auth/wrong-password':'Contrasena incorrecta',
        'auth/email-already-in-use':'Correo ya registrado',
        'auth/weak-password':'Minimo 6 caracteres',
        'auth/popup-closed-by-user':'Ventana cerrada',
        'auth/network-request-failed':'Error de conexion',
        'auth/invalid-credential':'Credenciales invalidas',
        'auth/too-many-requests':'Demasiados intentos. Intenta mas tarde',
        'auth/operation-not-allowed':'Metodo no habilitado en Firebase Console',
        'auth/account-exists-with-different-credential':'Ya existe cuenta con este correo'
      }; 
      return e[code] || 'Error de autenticacion: ' + code; 
    }

    function showFieldError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
      const input = el.previousElementSibling;
      if (input && input.classList) input.classList.add('error');
    }

    function clearErrors() {
      document.querySelectorAll('.error-msg').forEach(el => el.classList.remove('visible'));
      document.querySelectorAll('.auth-input').forEach(el => el.classList.remove('error'));
    }

    function showToast(msg, type='success') { 
      const c = document.getElementById('toastContainer'); 
      const t = document.createElement('div'); 
      t.className = `toast ${type}`; 
      const i = { success:'✅', error:'❌' }; 
      t.innerHTML = `${i[type]} ${msg}`; 
      c.appendChild(t); 
      setTimeout(() => t.remove(), 3000); 
    }

    function showLoading(s) { 
      document.getElementById('loadingOverlay').classList.toggle('active', s); 
    }
  </script>
</body>
</html>
