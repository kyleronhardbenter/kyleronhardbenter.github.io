<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pro</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>
body{
    margin:0;
    font-family:Inter;
    background:#0b0b0b;
    color:white;
}

/* AUTH */
.auth-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

.auth-box{
    background:#111;
    padding:25px;
    border-radius:12px;
    width:300px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.auth-box input{
    padding:10px;
    border-radius:8px;
    border:none;
}

.auth-actions{
    display:flex;
    gap:10px;
}

.auth-actions button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* USER BAR */
.user-bar{
    position:fixed;
    top:10px;
    right:10px;
    background:#111;
    padding:10px;
    border-radius:10px;
    z-index:99999;
    display:flex;
    gap:10px;
    align-items:center;
}

.hidden{display:none;}

.user-bar button{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- USER BAR -->
<div id="userBar" class="user-bar hidden">
    <span id="userEmail">No logueado</span>
    <button id="logoutBtn">Logout</button>
</div>

<!-- LOGIN MODAL -->
<div id="authModal" class="auth-modal">
    <div class="auth-box">
        <h2>Acceso</h2>

        <input type="email" id="authEmail" placeholder="Correo">
        <input type="password" id="authPassword" placeholder="Contraseña">

        <div class="auth-actions">
            <button id="loginBtn">Login</button>
            <button id="registerBtn">Registro</button>
        </div>

        <p id="authMsg"></p>
    </div>
</div>

<!-- TU CONTENIDO ORIGINAL VA AQUÍ -->
<h1 style="text-align:center;margin-top:120px;">TU DASHBOARD AQUÍ</h1>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";

import {
    getDatabase,
    ref,
    set
} from "https://www.gstatic.com/firebasejs/10.13.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyD-ET-NddOEtiNvSt7787wxVbGoDj8-kas",
    authDomain: "website-cc7ff.firebaseapp.com",
    databaseURL: "https://website-cc7ff-default-rtdb.firebaseio.com",
    projectId: "website-cc7ff",
    storageBucket: "website-cc7ff.firebasestorage.app",
    messagingSenderId: "755069923532",
    appId: "1:755069923532:web:62384a64fb880100ff1269"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ELEMENTOS
const authModal = document.getElementById("authModal");
const userBar = document.getElementById("userBar");
const userEmail = document.getElementById("userEmail");
const authMsg = document.getElementById("authMsg");

// LOGIN
document.getElementById("loginBtn").onclick = async () => {
    try {
        await signInWithEmailAndPassword(
            auth,
            authEmail.value,
            authPassword.value
        );
        authMsg.textContent = "Login correcto";
    } catch (e) {
        authMsg.textContent = e.message;
    }
};

// REGISTRO
document.getElementById("registerBtn").onclick = async () => {
    try {
        await createUserWithEmailAndPassword(
            auth,
            authEmail.value,
            authPassword.value
        );
        authMsg.textContent = "Usuario creado";
    } catch (e) {
        authMsg.textContent = e.message;
    }
};

// LOGOUT
document.getElementById("logoutBtn").onclick = () => {
    signOut(auth);
};

// ESTADO USUARIO
onAuthStateChanged(auth, (user) => {
    if (user) {
        authModal.style.display = "none";
        userBar.classList.remove("hidden");
        userEmail.textContent = user.email;

        // guardar login
        set(ref(db, "usuarios/" + user.uid), {
            email: user.email,
            lastLogin: Date.now()
        });

    } else {
        authModal.style.display = "flex";
        userBar.classList.add("hidden");
    }
});

// AUTOGUARDADO
setInterval(() => {
    const user = auth.currentUser;
    if (!user) return;

    set(ref(db, "usuarios/" + user.uid), {
        email: user.email,
        lastActive: Date.now()
    });

}, 15000);
</script>

</body>
</html>
