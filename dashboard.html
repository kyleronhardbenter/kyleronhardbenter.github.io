<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinTech OS - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ===== DASHBOARD SPECIFIC STYLES ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-value {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-top: 8px;
      letter-spacing: -0.5px;
    }
    .stat-value.income { color: var(--positive); }
    .stat-value.expense { color: var(--negative); }
    .stat-value.balance { color: var(--text-primary); }
    .stat-value.savings { color: var(--accent); }
    .stat-label {
      font-size: 12px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }
    .stat-change {
      font-size: 12px;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 500;
    }
    .stat-change.up { color: var(--positive); }
    .stat-change.down { color: var(--negative); }
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
    .chart-container { height: 280px; position: relative; }
    .chart-svg { width: 100%; height: 100%; }
    .chart-line { fill: none; stroke-width: 2; stroke-linecap: round; }
    .chart-area { opacity: 0.1; }
    .chart-grid-line { stroke: var(--border-subtle); stroke-width: 0.5; }
    .chart-axis-text {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      fill: var(--text-muted);
    }
    .goals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .goal-item {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .goal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .goal-name {
      font-weight: 500;
      font-size: 14px;
      color: var(--text-primary);
    }
    .goal-amount {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .goal-bar-bg {
      width: 100%;
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
    }
    .goal-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    /* Progress ring */
    .progress-ring {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring-bg { fill: none; stroke: var(--border-subtle); stroke-width: 6; }
    .progress-ring-fill {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s ease;
    }
    .progress-text {
      font-family: 'Inter', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin-top: 12px;
      letter-spacing: -1px;
    }
    .progress-label {
      font-size: 12px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
      font-weight: 500;
    }
    /* Stats cards accent lines */
    .stats-grid .card {
      position: relative;
      overflow: hidden;
    }
    .stats-grid .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      opacity: 0.6;
    }
    .stats-grid .card:nth-child(1)::before { background: var(--positive); }
    .stats-grid .card:nth-child(2)::before { background: var(--negative); }
    .stats-grid .card:nth-child(3)::before { background: var(--text-primary); }
    .stats-grid .card:nth-child(4)::before { background: var(--accent); }
    /* Progress ring glow */
    .progress-ring-fill {
      filter: drop-shadow(0 0 4px var(--accent-glow));
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="app">
    <header class="header">
      <div class="logo"><span>◈</span> FIN<span>TECH</span> OS</div>
      <nav class="nav-tabs desktop-nav">
        <button class="nav-tab active" onclick="location.href='dashboard.html'">📊 Dashboard</button>
        <button class="nav-tab" onclick="location.href='registros.html'">📝 Registros</button>
        <button class="nav-tab" onclick="location.href='programables.html'">⏰ Programables</button>
        <button class="nav-tab" onclick="location.href='metas.html'">🎯 Metas</button>
        <button class="nav-tab" onclick="location.href='divisas.html'">💱 Divisas</button>
        <button class="nav-tab" onclick="location.href='configuracion.html'">⚙️ Config</button>
      </nav>
      <div class="user-profile">
        <div class="user-avatar">U</div>
        <div class="user-info">
          <div class="user-name">Usuario</div>
          <button class="logout-btn" onclick="logout()">🚪 Salir</button>
        </div>
      </div>
    </header>

    <!-- DASHBOARD PAGE -->
    <div id="page-dashboard" class="page active">
      <div class="stats-grid">
        <div class="card">
          <div class="stat-label" data-i18n="month_income">Ingresos del Mes</div>
          <div class="stat-value income" id="dash-income">$0.00</div>
          <div class="stat-change" id="dash-income-change">—</div>
        </div>
        <div class="card">
          <div class="stat-label" data-i18n="month_expense">Gastos del Mes</div>
          <div class="stat-value expense" id="dash-expense">$0.00</div>
          <div class="stat-change" id="dash-expense-change">—</div>
        </div>
        <div class="card">
          <div class="stat-label" data-i18n="net_balance">Balance Neto</div>
          <div class="stat-value balance" id="dash-balance">$0.00</div>
          <div class="stat-change" id="dash-balance-change">—</div>
        </div>
        <div class="card">
          <div class="stat-label" data-i18n="accumulated_savings">Ahorro Acumulado</div>
          <div class="stat-value savings" id="dash-savings">$0.00</div>
          <div class="stat-change" id="dash-savings-change">—</div>
        </div>
      </div>

      <div class="charts-grid" style="margin-bottom: 24px;">
        <div class="card">
          <div class="card-title" data-i18n="monthly_evolution">📈 Evolución Mensual</div>
          <div class="chart-container" id="main-chart"></div>
        </div>
        <div class="card">
          <div class="card-title" data-i18n="goal_progress">🎯 Progreso de Metas</div>
          <div class="progress-ring" id="savings-ring"></div>
        </div>
      </div>

      <div class="card" style="margin-bottom: 24px;">
        <div class="card-title" data-i18n="saving_goals">🎯 Objetivos de Ahorro</div>
        <div class="goals-grid" id="goals-container"></div>
      </div>

      <div class="charts-grid">
        <div class="card">
          <div class="card-title" data-i18n="expense_dist">📊 Distribución de Gastos</div>
          <div class="chart-container" id="expense-chart"></div>
        </div>
        <div class="card">
          <div class="card-title" data-i18n="income_dist">💰 Distribución de Ingresos</div>
          <div class="chart-container" id="income-chart"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    // Firebase y lógica del dashboard...
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDmOVgHXXhLAp59JFI0UolZTW9pWyYZuoA",
      authDomain: "finanzas-pagina.firebaseapp.com",
      databaseURL: "https://finanzas-pagina-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "finanzas-pagina",
      storageBucket: "finanzas-pagina.firebasestorage.app",
      messagingSenderId: "138404823610",
      appId: "1:138404823610:web:e404ba1b91c02c71d56b03"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.transactions = [];
    window.savingsGoals = [];
    window.userCurrency = 'USD';

    const EXCHANGE_RATES = {
      USD: { rate: 1.0, symbol: '$', name: 'Dólar Estadounidense', flag: '🇺🇸', decimals: 2 },
      EUR: { rate: 0.8683, symbol: '€', name: 'Euro', flag: '🇪🇺', decimals: 2 },
      GBP: { rate: 0.7497, symbol: '£', name: 'Libra Esterlina', flag: '🇬🇧', decimals: 2 },
      JPY: { rate: 160.77, symbol: '¥', name: 'Yen Japonés', flag: '🇯🇵', decimals: 0 },
      CNY: { rate: 6.7758, symbol: '¥', name: 'Yuan Chino', flag: '🇨🇳', decimals: 2 },
      MXN: { rate: 17.3792, symbol: '$', name: 'Peso Mexicano', flag: '🇲🇽', decimals: 2 },
      COP: { rate: 4085.0, symbol: '$', name: 'Peso Colombiano', flag: '🇨🇴', decimals: 0 },
      ARS: { rate: 1075.0, symbol: '$', name: 'Peso Argentino', flag: '🇦🇷', decimals: 2 },
      BRL: { rate: 5.1241, symbol: 'R$', name: 'Real Brasileño', flag: '🇧🇷', decimals: 2 },
      PHP: { rate: 61.54, symbol: '₱', name: 'Peso Filipino', flag: '🇵🇭', decimals: 2 }
    };

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        location.href = 'login.html';
        return;
      }
      document.getElementById('user-name').textContent = user.displayName || user.email.split('@')[0];
      document.querySelector('.user-avatar').textContent = (user.displayName || user.email)[0].toUpperCase();

      const profileSnap = await get(ref(db, `users/${user.uid}/profile`));
      if (profileSnap.exists() && profileSnap.val().currency) {
        window.userCurrency = profileSnap.val().currency;
      }

      setupUserData(user.uid);
    });

    function setupUserData(uid) {
      onValue(ref(db, `users/${uid}/transactions`), (snap) => {
        const data = snap.val();
        window.transactions = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
        updateDashboard();
      });
      onValue(ref(db, `users/${uid}/goals`), (snap) => {
        const data = snap.val();
        window.savingsGoals = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
        updateDashboard();
      });
    }

    function updateDashboard() {
      const now = new Date();
      const currentMonth = now.toISOString().slice(0, 7);
      const prevMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString().slice(0, 7);
      const curr = EXCHANGE_RATES[window.userCurrency];

      const monthTrans = window.transactions.filter(t => t.fecha.startsWith(currentMonth));
      const income = monthTrans.filter(t => t.tipo === 'income').reduce((s, t) => s + t.monto, 0);
      const expense = monthTrans.filter(t => t.tipo === 'expense').reduce((s, t) => s + t.monto, 0);
      const balance = income - expense;
      const savings = window.transactions.filter(t => t.tipo === 'income').reduce((s, t) => s + t.monto, 0)
                    - window.transactions.filter(t => t.tipo === 'expense').reduce((s, t) => s + t.monto, 0);

      const prevMonthTrans = window.transactions.filter(t => t.fecha.startsWith(prevMonth));
      const prevIncome = prevMonthTrans.filter(t => t.tipo === 'income').reduce((s, t) => s + t.monto, 0);
      const prevExpense = prevMonthTrans.filter(t => t.tipo === 'expense').reduce((s, t) => s + t.monto, 0);
      const prevBalance = prevIncome - prevExpense;

      document.getElementById('dash-income').textContent = curr.symbol + income.toLocaleString('en-US', {minimumFractionDigits: 2});
      document.getElementById('dash-expense').textContent = curr.symbol + expense.toLocaleString('en-US', {minimumFractionDigits: 2});
      document.getElementById('dash-balance').textContent = curr.symbol + balance.toLocaleString('en-US', {minimumFractionDigits: 2});
      document.getElementById('dash-savings').textContent = curr.symbol + Math.max(0, savings).toLocaleString('en-US', {minimumFractionDigits: 2});

      updateStatChange('dash-income-change', income, prevIncome, 'income');
      updateStatChange('dash-expense-change', expense, prevExpense, 'expense');
      updateStatChange('dash-balance-change', balance, prevBalance, 'balance');

      const totalTarget = window.savingsGoals.reduce((s, g) => s + g.target, 0);
      const totalCurrent = window.savingsGoals.reduce((s, g) => s + g.current, 0);
      const savingsPct = totalTarget > 0 ? Math.round((totalCurrent / totalTarget) * 100) : 0;
      const savingsEl = document.getElementById('dash-savings-change');
      savingsEl.textContent = '▲ Meta al ' + savingsPct + '%';
      savingsEl.className = 'stat-change up';

      renderMainChart();
      renderSavingsRing();
      renderGoals();
      renderDistributionCharts();
    }

    function updateStatChange(elementId, current, previous, type) {
      const el = document.getElementById(elementId);
      if (previous === 0 && current === 0) { el.textContent = '—'; el.className = 'stat-change'; return; }
      if (previous === 0) { el.textContent = '▲ Nuevo'; el.className = 'stat-change up'; return; }
      const pct = ((current - previous) / Math.abs(previous)) * 100;
      const absPct = Math.abs(pct).toFixed(1);
      const isUp = pct >= 0;
      let isGood = isUp;
      if (type === 'expense') isGood = !isUp;
      const arrow = isUp ? '▲' : '▼';
      const sign = isUp ? '+' : '';
      el.textContent = `${arrow} ${sign}${absPct}% vs mes anterior`;
      el.className = isGood ? 'stat-change up' : 'stat-change down';
    }

    function renderGoals() {
      document.getElementById('goals-container').innerHTML = window.savingsGoals.map(g => {
        const pct = Math.min(100, (g.current / g.target) * 100);
        return `
          <div class="goal-item">
            <div class="goal-header">
              <span class="goal-name">${g.name}</span>
              <span class="goal-amount">$${g.current.toLocaleString()} / $${g.target.toLocaleString()}</span>
            </div>
            <div class="goal-bar-bg">
              <div class="goal-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${g.color},${g.color}88);"></div>
            </div>
            <div style="font-size:12px;color:var(--text-muted);text-align:right;">${pct.toFixed(1)}% completado</div>
          </div>
        `;
      }).join('');
    }

    function renderMainChart() {
      const container = document.getElementById('main-chart');
      const months = [];
      for (let i = 5; i >= 0; i--) {
        const d = new Date(); d.setMonth(d.getMonth() - i);
        months.push(d.toISOString().slice(0, 7));
      }
      const incomeData = months.map(m => window.transactions.filter(t => t.fecha.startsWith(m) && t.tipo === 'income').reduce((s, t) => s + t.monto, 0));
      const expenseData = months.map(m => window.transactions.filter(t => t.fecha.startsWith(m) && t.tipo === 'expense').reduce((s, t) => s + t.monto, 0));
      const maxVal = Math.max(...incomeData, ...expenseData, 100);
      const w = container.clientWidth || 600;
      const h = 300;
      const pad = { t: 20, r: 20, b: 40, l: 60 };
      const cw = w - pad.l - pad.r;
      const ch = h - pad.t - pad.b;
      const points = (data) => data.map((v, i) => {
        const x = pad.l + (i / (data.length - 1)) * cw;
        const y = pad.t + ch - (v / maxVal) * ch;
        return `${x},${y}`;
      }).join(' ');
      const area = (data) => {
        const pts = data.map((v, i) => {
          const x = pad.l + (i / (data.length - 1)) * cw;
          const y = pad.t + ch - (v / maxVal) * ch;
          return `${x},${y}`;
        }).join(' ');
        return `${pad.l},${pad.t + ch} ${pts} ${pad.l + cw},${pad.t + ch}`;
      };
      const monthLabels = months.map(m => {
        const [y, mo] = m.split('-');
        return ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(mo)-1];
      });
      container.innerHTML = `
        <svg class="chart-svg" viewBox="0 0 ${w} ${h}">
          <defs>
            <linearGradient id="gradInc" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#00ff88" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="gradExp" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ff3366" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="#ff3366" stop-opacity="0"/>
            </linearGradient>
          </defs>
          ${[0, 0.25, 0.5, 0.75, 1].map(p => {
            const y = pad.t + ch * p;
            return `<line class="chart-grid-line" x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}"/>`;
          }).join('')}
          <polygon class="chart-area" points="${area(incomeData)}" fill="url(#gradInc)"/>
          <polygon class="chart-area" points="${area(expenseData)}" fill="url(#gradExp)"/>
          <polyline class="chart-line" points="${points(incomeData)}" stroke="#00ff88"/>
          <polyline class="chart-line" points="${points(expenseData)}" stroke="#ff3366"/>
          ${incomeData.map((v, i) => {
            const x = pad.l + (i / (incomeData.length - 1)) * cw;
            const y = pad.t + ch - (v / maxVal) * ch;
            return `<circle cx="${x}" cy="${y}" r="4" fill="#00ff88" stroke="#0a0e17" stroke-width="2"/>`;
          }).join('')}
          ${expenseData.map((v, i) => {
            const x = pad.l + (i / (expenseData.length - 1)) * cw;
            const y = pad.t + ch - (v / maxVal) * ch;
            return `<circle cx="${x}" cy="${y}" r="4" fill="#ff3366" stroke="#0a0e17" stroke-width="2"/>`;
          }).join('')}
          ${monthLabels.map((l, i) => {
            const x = pad.l + (i / (monthLabels.length - 1)) * cw;
            return `<text class="chart-axis-text" x="${x}" y="${h-10}" text-anchor="middle">${l}</text>`;
          }).join('')}
          ${[0, 0.5, 1].map(p => {
            const val = Math.round(maxVal * (1 - p));
            const y = pad.t + ch * p;
            return `<text class="chart-axis-text" x="${pad.l-10}" y="${y+4}" text-anchor="end">$${val}</text>`;
          }).join('')}
        </svg>
      `;
    }

    function renderSavingsRing() {
      const totalTarget = window.savingsGoals.reduce((s, g) => s + g.target, 0);
      const totalCurrent = window.savingsGoals.reduce((s, g) => s + g.current, 0);
      const pct = totalTarget > 0 ? (totalCurrent / totalTarget) * 100 : 0;
      const r = 70;
      const c = 2 * Math.PI * r;
      const offset = c - (pct / 100) * c;
      document.getElementById('savings-ring').innerHTML = `
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle class="progress-ring-bg" cx="90" cy="90" r="${r}"/>
          <circle class="progress-ring-fill" cx="90" cy="90" r="${r}"
            stroke="url(#ringGrad)" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
          <defs>
            <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#00d4ff"/>
              <stop offset="100%" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="progress-text">${Math.round(pct)}%</div>
        <div class="progress-label">Meta Global</div>
        <div style="font-size:14px;color:var(--text-muted);margin-top:4px;">$${totalCurrent.toLocaleString()} / $${totalTarget.toLocaleString()}</div>
      `;
    }

    function renderDistributionCharts() {
      const catTotals = {};
      window.transactions.forEach(t => {
        if (!catTotals[t.categoria]) catTotals[t.categoria] = { income: 0, expense: 0 };
        catTotals[t.categoria][t.tipo] += t.monto;
      });
      const renderPie = (containerId, type) => {
        const container = document.getElementById(containerId);
        const data = Object.entries(catTotals)
          .filter(([_, v]) => v[type] > 0)
          .map(([k, v]) => ({ cat: k, val: v[type] }))
          .sort((a, b) => b.val - a.val);
        if (data.length === 0) {
          container.innerHTML = '<div class="empty-state" style="padding:40px;"><div class="empty-state-icon">📊</div><p>Sin datos para mostrar</p></div>';
          return;
        }
        const total = data.reduce((s, d) => s + d.val, 0);
        const w = container.clientWidth || 300;
        const h = 280;
        const cx = w / 2;
        const cy = h / 2 - 10;
        const r = Math.min(w, h) / 2 - 40;
        const colors = ['#00d4ff','#a855f7','#00ff88','#f59e0b','#ff3366','#6366f1','#ec4899','#14b8a6'];
        let startAngle = -Math.PI / 2;
        let paths = '';
        let legend = '';
        data.forEach((d, i) => {
          const angle = (d.val / total) * 2 * Math.PI;
          const endAngle = startAngle + angle;
          const x1 = cx + r * Math.cos(startAngle);
          const y1 = cy + r * Math.sin(startAngle);
          const x2 = cx + r * Math.cos(endAngle);
          const y2 = cy + r * Math.sin(endAngle);
          const largeArc = angle > Math.PI ? 1 : 0;
          const c = colors[i % colors.length];
          paths += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${c}" opacity="0.85" class="chart-bar"/>`;
          legend += `<div style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px;"><span style="width:10px;height:10px;border-radius:2px;background:${c};"></span><span style="color:var(--text-secondary);">${getCategoryName(d.cat)}</span><span style="margin-left:auto;font-family:'Orbitron';font-size:11px;">${((d.val/total)*100).toFixed(0)}%</span></div>`;
          startAngle = endAngle;
        });
        container.innerHTML = `
          <div style="display:flex;align-items:center;gap:20px;height:100%;">
            <svg width="${w/2}" height="${h}" viewBox="0 0 ${w} ${h}">${paths}</svg>
            <div style="flex:1;">${legend}</div>
          </div>
        `;
      };
      renderPie('expense-chart', 'expense');
      renderPie('income-chart', 'income');
    }

    function getCategoryName(c) {
      const names = {
        salario: 'Salario', freelance: 'Freelance', inversiones: 'Inversiones',
        ventas: 'Ventas', 'otros-ing': 'Otros Ingresos',
        vivienda: 'Vivienda', alimentacion: 'Alimentación', transporte: 'Transporte',
        servicios: 'Servicios', entretenimiento: 'Entretenimiento', salud: 'Salud',
        educacion: 'Educación', 'otros-gas': 'Otros Gastos'
      };
      return names[c] || c;
    }

    window.logout = async () => {
      const { signOut } = await import("https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js");
      await signOut(auth);
      location.href = 'login.html';
    };

    window.addEventListener('resize', () => {
      renderMainChart();
      renderDistributionCharts();
    });
  </script>
</body>
</html>
