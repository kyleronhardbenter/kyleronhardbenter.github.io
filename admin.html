<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chalito Collblanc - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#FF6B00;--primary-light:#FFF0E0;--secondary:#1a1a2e;--accent:#00C853;--danger:#FF1744;--warning:#FFB300;--info:#2196F3;--bg:#f8f9fa;--card:#ffffff;--text:#2d3436;--text-light:#636e72;--border:#e9ecef;--shadow:0 4px 20px rgba(0,0,0,0.08);--shadow-lg:0 10px 40px rgba(0,0,0,0.12);--radius:16px;--radius-sm:10px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .app-container{max-width:1200px;margin:0 auto;padding:20px}
    .header{background:var(--card);border-radius:var(--radius);padding:24px 32px;margin-bottom:24px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;position:relative;overflow:hidden}
    .header::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--primary);border-radius:var(--radius) 0 0 var(--radius)}
    .header-brand{display:flex;align-items:center;gap:16px}
    .header-icon{width:56px;height:56px;background:var(--primary-light);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px}
    .header-title{font-size:24px;font-weight:700;color:var(--secondary)}
    .header-subtitle{font-size:13px;color:var(--text-light);margin-top:2px}
    .header-user{display:flex;align-items:center;gap:12px;background:var(--bg);padding:8px 16px;border-radius:50px;cursor:pointer;transition:all .2s}
    .header-user:hover{background:var(--border)}
    .user-avatar{width:36px;height:36px;background:var(--primary);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px}
    .role-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase}
    .role-admin{background:#E3F2FD;color:#1565C0}
    .conn-status{display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
    .conn-online{background:#E8F5E9;color:#2E7D32}
    .conn-offline{background:#FFEBEE;color:#C62828}
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
    .stat-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);text-align:center;transition:all .3s}
    .stat-card:hover{transform:translateY(-2px)}
    .stat-value{font-size:32px;font-weight:700;color:var(--primary);line-height:1}
    .stat-label{font-size:12px;color:var(--text-light);margin-top:8px;text-transform:uppercase;letter-spacing:.5px}
    .nav-tabs{display:flex;gap:8px;margin-bottom:24px;background:var(--card);padding:8px;border-radius:var(--radius);box-shadow:var(--shadow)}
    .nav-tab{flex:1;padding:14px 20px;border:none;background:transparent;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;color:var(--text-light);transition:all .3s ease;display:flex;align-items:center;justify-content:center;gap:8px}
    .nav-tab:hover{background:var(--bg);color:var(--text)}
    .nav-tab.active{background:var(--primary);color:white;box-shadow:0 4px 12px rgba(255,107,0,0.3)}
    .nav-tab .badge{background:rgba(255,255,255,0.25);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
    .content-area{display:none;animation:fadeIn .4s ease}
    .content-area.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px}
    .card{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);transition:all .3s ease;position:relative;overflow:hidden}
    .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
    .card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
    .card-status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .status-pendiente{background:#FFF3E0;color:#E65100}
    .status-aprobado{background:#E8F5E9;color:#2E7D32}
    .status-rechazado{background:#FFEBEE;color:#C62828}
    .status-enviado{background:#E3F2FD;color:#1565C0}
    .status-entregado{background:#F3E5F5;color:#6A1B9A}
    .status-revisado{background:#E0F7FA;color:#00838F}
    .status-cerrado{background:#ECEFF1;color:#546E7A}
    .card-title{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--secondary)}
    .card-desc{font-size:13px;color:var(--text-light);line-height:1.5;margin-bottom:16px}
    .card-meta{display:flex;gap:16px;font-size:12px;color:var(--text-light);flex-wrap:wrap}
    .card-meta span{display:flex;align-items:center;gap:4px}
    .card-actions{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap}
    .btn{padding:8px 16px;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s ease;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:var(--primary);color:white}
    .btn-primary:hover{background:#E65C00;transform:scale(1.02)}
    .btn-secondary{background:var(--bg);color:var(--text)}
    .btn-secondary:hover{background:var(--border)}
    .btn-danger{background:#FFEBEE;color:var(--danger)}
    .btn-danger:hover{background:#FFCDD2}
    .btn-info{background:#E3F2FD;color:var(--info)}
    .btn-info:hover{background:#BBDEFB}
    .btn-success{background:#E8F5E9;color:var(--accent)}
    .btn-success:hover{background:#C8E6C9}
    .btn-warning{background:#FFF3E0;color:#E65100}
    .btn-warning:hover{background:#FFE0B2}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
    .modal-overlay.active{display:flex;animation:fadeIn .2s ease}
    .modal{background:var(--card);border-radius:var(--radius);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .3s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .modal-header{padding:24px 28px 0;display:flex;justify-content:space-between;align-items:center}
    .modal-title{font-size:20px;font-weight:700;color:var(--secondary)}
    .modal-close{width:36px;height:36px;border:none;background:var(--bg);border-radius:10px;cursor:pointer;font-size:18px;color:var(--text-light);transition:all .2s}
    .modal-close:hover{background:var(--border);color:var(--text)}
    .modal-body{padding:20px 28px 28px}
    .video-upload-area{border:2px dashed var(--primary);border-radius:var(--radius-sm);padding:24px;text-align:center;background:var(--primary-light);cursor:pointer;transition:all .2s}
    .video-upload-area:hover{background:#FFE0B2}
    .file-upload-icon{font-size:36px;margin-bottom:8px}
    .file-upload-text{font-size:13px;color:var(--text-light)}
    .video-preview{width:100%;border-radius:var(--radius-sm);margin-top:12px;max-height:200px}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text-light);grid-column:1/-1}
    .empty-state-icon{font-size:64px;margin-bottom:16px;opacity:.5}
    .empty-state-title{font-size:18px;font-weight:600;color:var(--secondary);margin-bottom:8px}
    .empty-state-desc{font-size:14px}
    .toast-container{position:fixed;top:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:10px}
    .toast{background:var(--secondary);color:white;padding:14px 20px;border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;font-size:14px;animation:slideInRight .3s ease;max-width:360px}
    .toast.success{background:var(--accent)}
    .toast.error{background:var(--danger)}
    .toast.info{background:var(--info)}
    @keyframes slideInRight{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
    .loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.9);display:none;align-items:center;justify-content:center;z-index:400;flex-direction:column;gap:16px}
    .loading-overlay.active{display:flex}
    .spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .admin-filter-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .filter-chip{padding:8px 16px;border-radius:20px;border:2px solid var(--border);background:white;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
    .filter-chip:hover{border-color:var(--primary)}
    .filter-chip.active{background:var(--primary);color:white;border-color:var(--primary)}
    .evidence-detail-box{background:#f8f9fa;border-radius:8px;padding:12px;margin-top:10px}
    .evidence-detail-row{display:flex;gap:16px;flex-wrap:wrap;font-size:12px}
    .evidence-detail-row span{display:flex;align-items:center;gap:4px;color:var(--text-light)}
    .evidence-detail-row strong{color:var(--secondary)}
    .comment-box{background:#FFF8E1;border-radius:8px;padding:12px;margin-top:10px;border-left:3px solid var(--warning)}
    .comment-box-title{font-size:11px;font-weight:600;color:#E65100;margin-bottom:4px}
    .comment-box-text{font-size:13px;color:var(--text);line-height:1.5}
    .incident-closed{opacity:0.6}
    @media(max-width:768px){.stats-row{grid-template-columns:repeat(2,1fr)}.cards-grid{grid-template-columns:1fr}.header{flex-direction:column;gap:16px;text-align:center}.nav-tab{font-size:12px;padding:10px}.nav-tab span:not(.badge){display:none}}
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <div class="header-brand">
        <div class="header-icon">🏪</div>
        <div>
          <div class="header-title">Chalito Collblanc</div>
          <div class="header-subtitle">Panel de Administración</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="conn-status conn-offline" id="connStatus"><span id="connDot">🔴</span> <span id="connText">Offline</span></div>
        <div class="header-user" onclick="logout()">
          <div class="user-avatar" id="userAvatar">A</div>
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--secondary);" id="userName">Admin</div>
            <div style="font-size:11px;color:var(--text-light);"><span class="role-badge role-admin" id="userRole">Admin</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-value" id="statTotalUsers">0</div><div class="stat-label">Empleados</div></div>
      <div class="stat-card"><div class="stat-value" id="statTotalEvidencias">0</div><div class="stat-label">Incidencias Total</div></div>
      <div class="stat-card"><div class="stat-value" id="statPendientesAdmin">0</div><div class="stat-label">Pendientes Revisión</div></div>
      <div class="stat-card"><div class="stat-value" id="statVideosSubidos">0</div><div class="stat-label">Videos Subidos</div></div>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="evidencias" onclick="switchTab('evidencias')">📸 <span>Incidencias</span> <span class="badge" id="badgeEvidencias">0</span></button>
      <button class="nav-tab" data-tab="vacaciones" onclick="switchTab('vacaciones')">🏖️ <span>Vacaciones</span> <span class="badge" id="badgeVacaciones">0</span></button>
      <button class="nav-tab" data-tab="materiales" onclick="switchTab('materiales')">📦 <span>Materiales</span> <span class="badge" id="badgeMateriales">0</span></button>
    </div>

    <div class="content-area active" id="tab-evidencias">
      <div style="background:linear-gradient(135deg,var(--secondary),#2d2d44);padding:24px;border-radius:var(--radius);margin-bottom:24px;color:white;">
        <div style="font-size:20px;font-weight:700;margin-bottom:8px;">👑 Panel de Administración</div>
        <div style="font-size:13px;opacity:0.8;">Gestiona todas las incidencias, sube videos de respuesta, marca como revisadas o cierra/reabre casos.</div>
      </div>
      <div class="admin-filter-bar">
        <button class="filter-chip active" onclick="filterAdmin('todos')">Todos</button>
        <button class="filter-chip" onclick="filterAdmin('pendiente')">Pendientes</button>
        <button class="filter-chip" onclick="filterAdmin('revisado')">Revisados</button>
        <button class="filter-chip" onclick="filterAdmin('cerrado')">Cerrados</button>
        <button class="filter-chip" onclick="filterAdmin('sin-video')">Sin Video</button>
      </div>
      <div class="cards-grid" id="gridEvidencias"></div>
    </div>

    <div class="content-area" id="tab-vacaciones"><div class="cards-grid" id="gridVacaciones"></div></div>
    <div class="content-area" id="tab-materiales"><div class="cards-grid" id="gridMateriales"></div></div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header"><div class="modal-title" id="modalTitle">Notificaciones</div><button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
  </div>

  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div style="color:var(--text-light);font-size:14px;">Sincronizando...</div></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where, orderBy, onSnapshot, serverTimestamp, Timestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = { apiKey:"AIzaSyAapba1gadT0M7ZjnEOIcg4Gj2SPE0HoJU", authDomain:"chalito-collblanc.firebaseapp.com", projectId:"chalito-collblanc", storageBucket:"chalito-collblanc.firebasestorage.app", messagingSenderId:"654415271839", appId:"1:654415271839:web:3bbabebca91415e8d00faa" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentUser = null, currentTab = 'evidencias', adminFilter = 'todos', unsubscribers = [];

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      currentUser = user;
      const userRef = doc(db, 'usuarios', user.uid);
      const userSnap = await getDoc(userRef);
      const profile = userSnap.exists() ? userSnap.data() : { rol: 'empleado' };
      if (profile.rol !== 'admin') { window.location.href = 'dashboard.html'; return; }
      document.getElementById('userName').textContent = profile.nombre || user.email.split('@')[0];
      document.getElementById('userAvatar').textContent = (profile.nombre || user.email)[0].toUpperCase();
      updateConnectionStatus(true);
      setupRealtimeListeners();
    });

    window.logout = async function() {
      unsubscribers.forEach(unsub => unsub());
      unsubscribers = [];
      await signOut(auth);
      window.location.href = 'index.html';
    };

    function setupRealtimeListeners() {
      if (!currentUser) return;
      unsubscribers.forEach(unsub => unsub());
      unsubscribers = [];
      const evQuery = query(collection(db, 'evidencias'), orderBy('creado', 'desc'));
      unsubscribers.push(onSnapshot(evQuery, (snapshot) => { const items = []; snapshot.forEach(d => items.push({ id: d.id, ...d.data() })); window._evidencias = items; if (currentTab === 'evidencias') renderEvidencias(); updateStats(); }, () => updateConnectionStatus(false)));
      const vacQuery = query(collection(db, 'vacaciones'), orderBy('creado', 'desc'));
      unsubscribers.push(onSnapshot(vacQuery, (snapshot) => { const items = []; snapshot.forEach(d => items.push({ id: d.id, ...d.data() })); window._vacaciones = items; if (currentTab === 'vacaciones') renderVacaciones(); updateStats(); }, () => updateConnectionStatus(false)));
      const matQuery = query(collection(db, 'materiales'), orderBy('creado', 'desc'));
      unsubscribers.push(onSnapshot(matQuery, (snapshot) => { const items = []; snapshot.forEach(d => items.push({ id: d.id, ...d.data() })); window._materiales = items; if (currentTab === 'materiales') renderMateriales(); updateStats(); }, () => updateConnectionStatus(false)));
      const unsubUsers = onSnapshot(collection(db, 'usuarios'), (snapshot) => { window._usuarios = snapshot.size; updateStats(); });
      unsubscribers.push(unsubUsers);
    }

    function updateConnectionStatus(online) {
      const status = document.getElementById('connStatus');
      const dot = document.getElementById('connDot');
      const text = document.getElementById('connText');
      if (online) { status.className = 'conn-status conn-online'; dot.textContent = '🟢'; text.textContent = 'Online'; }
      else { status.className = 'conn-status conn-offline'; dot.textContent = '🔴'; text.textContent = 'Offline'; }
    }

    function updateStats() {
      const ev = window._evidencias || [];
      const vac = window._vacaciones || [];
      const mat = window._materiales || [];
      document.getElementById('statTotalUsers').textContent = window._usuarios || 0;
      document.getElementById('statTotalEvidencias').textContent = ev.length;
      document.getElementById('statPendientesAdmin').textContent = ev.filter(e => e.estado === 'pendiente').length;
      document.getElementById('statVideosSubidos').textContent = ev.filter(e => e.videoUrl).length;
      document.getElementById('badgeEvidencias').textContent = ev.filter(e => e.estado === 'pendiente').length;
      document.getElementById('badgeVacaciones').textContent = vac.filter(v => v.estado === 'pendiente').length;
      document.getElementById('badgeMateriales').textContent = mat.filter(m => m.estado === 'pendiente').length;
    }

    window.switchTab = function(tab) {
      currentTab = tab;
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
      renderCurrentTab();
    };

    function renderCurrentTab() {
      if (currentTab === 'evidencias') renderEvidencias();
      else if (currentTab === 'vacaciones') renderVacaciones();
      else if (currentTab === 'materiales') renderMateriales();
    }

    window.filterAdmin = function(filter) {
      adminFilter = filter;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      renderEvidencias();
    };

    function getStatusClass(estado) {
      const map = { pendiente: 'status-pendiente', aprobado: 'status-aprobado', rechazado: 'status-rechazado', enviado: 'status-enviado', entregado: 'status-entregado', revisado: 'status-revisado', cerrado: 'status-cerrado' };
      return map[estado] || 'status-pendiente';
    }

    function getStatusIcon(estado) {
      const map = { pendiente: '⏳', aprobado: '✅', rechazado: '❌', enviado: '📤', entregado: '📦', revisado: '👁️', cerrado: '🔒' };
      return map[estado] || '⏳';
    }

    function formatDate(dateVal) {
      if (!dateVal) return '-';
      let date;
      if (dateVal instanceof Timestamp) date = dateVal.toDate();
      else if (typeof dateVal === 'string') date = new Date(dateVal + 'T00:00:00');
      else date = new Date(dateVal);
      return date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function formatFirestoreDate(dateVal) {
      if (!dateVal) return '-';
      if (dateVal instanceof Timestamp) return dateVal.toDate().toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
      return '-';
    }

    // ==================== EVIDENCIAS MEJORADAS ====================
    function renderEvidencias() {
      const grid = document.getElementById('gridEvidencias');
      let items = window._evidencias || [];
      if (adminFilter === 'pendiente') items = items.filter(e => e.estado === 'pendiente');
      else if (adminFilter === 'revisado') items = items.filter(e => e.estado === 'revisado');
      else if (adminFilter === 'cerrado') items = items.filter(e => e.estado === 'cerrado');
      else if (adminFilter === 'sin-video') items = items.filter(e => !e.videoUrl);
      
      if (items.length === 0) { 
        grid.innerHTML = emptyState('📸', 'Sin incidencias para revisar', 'Todas las incidencias han sido atendidas'); 
        return; 
      }
      
      grid.innerHTML = items.map(e => {
        const hasVideo = !!e.videoUrl;
        const isCerrado = e.estado === 'cerrado';
        const isRevisado = e.estado === 'revisado';
        const isPendiente = e.estado === 'pendiente';
        
        // Incident details
        let detailsHtml = '';
        if (e.numeroPedido || e.numeroRecogida) {
          detailsHtml += `<div class="evidence-detail-box"><div class="evidence-detail-row">`;
          if (e.numeroPedido) detailsHtml += `<span>🛒 Pedido: <strong>#${e.numeroPedido}</strong></span>`;
          if (e.numeroRecogida) detailsHtml += `<span>📋 Recogida: <strong>#${e.numeroRecogida}</strong></span>`;
          detailsHtml += `</div></div>`;
        }
        
        // Comment
        let commentHtml = '';
        if (e.comentario) {
          commentHtml = `<div class="comment-box">
            <div class="comment-box-title">💬 Comentario del empleado</div>
            <div class="comment-box-text">${e.comentario}</div>
          </div>`;
        }
        
        // Admin actions
        let actionsHtml = '';
        if (!isCerrado) {
          if (!hasVideo) {
            actionsHtml += `<button class="btn btn-success" onclick="document.getElementById('videoInput_${e.id}').click()">🎥 Subir Video</button>
            <input type="file" id="videoInput_${e.id}" accept="video/*" style="display:none" onchange="uploadVideo('${e.id}',this)">`;
          } else {
            actionsHtml += `<button class="btn btn-secondary" onclick="document.getElementById('videoInput_${e.id}').click()">🔄 Cambiar Video</button>
            <input type="file" id="videoInput_${e.id}" accept="video/*" style="display:none" onchange="uploadVideo('${e.id}',this)">`;
          }
          actionsHtml += `<button class="btn btn-info" onclick="markAsRevisado('${e.id}',${e.estado === 'revisado' ? 'false' : 'true'})">${e.estado === 'revisado' ? '↩️ Desmarcar' : '✅ Marcar revisado'}</button>`;
        }
        actionsHtml += `<button class="btn btn-warning" onclick="toggleCerrarIncidente('${e.id}',${isCerrado ? 'false' : 'true'})">${isCerrado ? '🔓 Reabrir' : '🔒 Cerrar'}</button>`;
        actionsHtml += `<button class="btn btn-danger" onclick="deleteItem('evidencias','${e.id}')">🗑️ Eliminar</button>`;
        
        return `<div class="card ${isCerrado ? 'incident-closed' : ''}">
          <div class="card-header">
            <div class="card-icon" style="background:#FFF3E0;">📸</div>
            <span class="card-status ${getStatusClass(e.estado)}">${getStatusIcon(e.estado)} ${e.estado}</span>
          </div>
          <div class="card-title">${e.tipo}${isCerrado ? ' <span style="font-size:11px;color:#999;">(Cerrado)</span>' : ''}</div>
          <div class="card-desc">${e.descripcion}</div>
          ${detailsHtml}
          ${commentHtml}
          <div class="card-meta" style="margin-top:12px;">
            <span>📅 ${formatDate(e.fecha)} ${e.hora || ''}</span>
            <span>👤 ${e.userName || e.userEmail || 'Empleado'}</span>
          </div>
          ${e.imagenes && Array.isArray(e.imagenes) && e.imagenes.length > 0 ? `<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">${e.imagenes.map(img => `<img src="${img}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;cursor:pointer;" onclick="window.open('${img}')">`).join('')}</div>` : ''}
          ${hasVideo ? `<div style="margin-top:16px;"><div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:8px;">🎥 Video ya subido</div><video class="video-preview" controls><source src="${e.videoUrl}" type="video/mp4"></video></div>` : `<div style="margin-top:16px;"><div class="video-upload-area" onclick="document.getElementById('videoInput_${e.id}').click()"><div class="file-upload-icon">🎥</div><div class="file-upload-text">Subir video de respuesta</div><input type="file" id="videoInput_${e.id}" accept="video/*" style="display:none" onchange="uploadVideo('${e.id}',this)"></div></div>`}
          <div class="card-meta" style="margin-top:8px;">
            <span style="font-size:11px;color:#999;">Registrado: ${formatFirestoreDate(e.creado)}</span>
          </div>
          <div class="card-actions">${actionsHtml}</div>
        </div>`;
      }).join('');
    }

    function calcularDias(inicio, fin) {
      if (!inicio || !fin) return 1;
      const d1 = new Date(inicio + 'T00:00:00');
      const d2 = new Date(fin + 'T00:00:00');
      const diff = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
      return diff > 0 ? diff : 1;
    }

    function renderVacaciones() {
      const grid = document.getElementById('gridVacaciones');
      const items = window._vacaciones || [];
      if (items.length === 0) { grid.innerHTML = emptyState('🏖️', 'Sin solicitudes de vacaciones', 'No hay solicitudes de vacaciones registradas'); return; }
      grid.innerHTML = items.map(v => {
        const dias = v.dias || calcularDias(v.inicio, v.fin);
        return `<div class="card"><div class="card-header"><div class="card-icon" style="background:#E3F2FD;">🏖️</div><span class="card-status ${getStatusClass(v.estado)}">${v.estado}</span></div><div class="card-title">${v.tipo}</div><div class="card-desc">${v.notas || 'Sin notas'}</div><div class="card-meta"><span>📅 ${formatDate(v.inicio)} → ${formatDate(v.fin)}</span><span>⏱️ ${dias} día${dias !== 1 ? 's' : ''}</span><span>👤 ${v.userName || v.uid}</span></div><div class="card-actions"><button class="btn btn-info" onclick="markVacacion('${v.id}','${v.estado === 'aprobado' ? 'pendiente' : 'aprobado'}')">${v.estado === 'aprobado' ? '↩️ Desaprobar' : '✅ Aprobar'}</button><button class="btn btn-danger" onclick="deleteItem('vacaciones','${v.id}')">🗑️ Eliminar</button></div></div>`;
      }).join('');
    }

    function renderMateriales() {
      const grid = document.getElementById('gridMateriales');
      const items = window._materiales || [];
      if (items.length === 0) { grid.innerHTML = emptyState('📦', 'Sin solicitudes de materiales', 'No hay solicitudes de materiales registradas'); return; }
      const urgenciaEmoji = { alta: '🔴', media: '🟡', baja: '🟢' };
      grid.innerHTML = items.map(m => `<div class="card"><div class="card-header"><div class="card-icon" style="background:#F3E5F5;">📦</div><span class="card-status ${getStatusClass(m.estado)}">${m.estado}</span></div><div class="card-title">${m.item}</div><div class="card-desc">Cantidad: <strong>${m.cantidad}</strong></div><div class="card-meta"><span>${urgenciaEmoji[m.urgencia] || '⚪'} Urgencia ${m.urgencia}</span><span>👤 ${m.uid}</span></div><div class="card-actions"><button class="btn btn-info" onclick="markMaterial('${m.id}','${m.estado === 'entregado' ? 'pendiente' : 'entregado'}')">${m.estado === 'entregado' ? '↩️ Pendiente' : '✅ Entregar'}</button><button class="btn btn-danger" onclick="deleteItem('materiales','${m.id}')">🗑️ Eliminar</button></div></div>`).join('');
    }

    function emptyState(icon, title, desc) {
      return `<div class="empty-state"><div class="empty-state-icon">${icon}</div><div class="empty-state-title">${title}</div><div class="empty-state-desc">${desc}</div></div>`;
    }

    // ==================== FIXED: uploadVideo with guaranteed loading stop ====================
    window.uploadVideo = async function(evidenceId, input) {
      // Always clear the input first so the same file can be selected again
      if (input) input.value = '';
      
      if (!input.files || input.files.length === 0) return;
      
      const file = input.files[0];
      if (!file.type.startsWith('video/')) { 
        showToast('El archivo debe ser un video', 'error'); 
        return; 
      }
      
      showLoading(true);
      let videoUrl = null;
      
      try {
        // Step 1: Upload to Storage
        const videoRef = ref(storage, `videos_respuesta/${evidenceId}/${Date.now()}_${file.name}`);
        await uploadBytes(videoRef, file);
        videoUrl = await getDownloadURL(videoRef);
        
        // Step 2: Update Firestore document
        await updateDoc(doc(db, 'evidencias', evidenceId), { 
          videoUrl: videoUrl, 
          videoNombre: file.name, 
          estado: 'revisado', 
          videoSubido: serverTimestamp() 
        });
        
        // Step 3: Send notification to employee
        try {
          const evRef = doc(db, 'evidencias', evidenceId);
          const evSnap = await getDoc(evRef);
          if (evSnap.exists()) {
            const evData = evSnap.data();
            await addDoc(collection(db, 'notificaciones'), { 
              userId: evData.uid, 
              title: '🎥 Video de respuesta disponible', 
              body: `El administrador ha subido un video de respuesta para tu incidencia: ${evData.tipo}`, 
              data: { evidenceId, tipo: 'video_disponible' }, 
              leida: false, 
              creado: serverTimestamp() 
            });
          }
        } catch (notifErr) {
          console.warn('Error enviando notificación:', notifErr);
          // Don't fail the whole operation if notification fails
        }
        
        showToast('✅ Video subido y notificación enviada al empleado', 'success');
      } catch (err) { 
        console.error('Error subiendo video:', err);
        showToast('❌ Error subiendo video: ' + (err.message || err.code || 'Error desconocido'), 'error'); 
      } finally { 
        // GUARANTEED: loading always stops
        showLoading(false); 
      }
    };

    window.markAsRevisado = async function(id, revisado) {
      showLoading(true);
      try { 
        await updateDoc(doc(db, 'evidencias', id), { estado: revisado ? 'revisado' : 'pendiente', actualizado: serverTimestamp() }); 
        showToast(revisado ? 'Marcado como revisado' : 'Desmarcado', 'success'); 
      }
      catch (err) { showToast('Error: ' + err.message, 'error'); } finally { showLoading(false); }
    };

    window.toggleCerrarIncidente = async function(id, cerrar) {
      showLoading(true);
      try { 
        await updateDoc(doc(db, 'evidencias', id), { 
          estado: cerrar ? 'cerrado' : 'revisado', 
          cerradoPor: currentUser.uid,
          cerradoEn: cerrar ? serverTimestamp() : null,
          actualizado: serverTimestamp() 
        }); 
        showToast(cerrar ? '🔒 Incidente cerrado' : '🔓 Incidente reabierto', 'success'); 
      }
      catch (err) { showToast('Error: ' + err.message, 'error'); } finally { showLoading(false); }
    };

    window.markVacacion = async function(id, estado) {
      showLoading(true);
      try { await updateDoc(doc(db, 'vacaciones', id), { estado, actualizado: serverTimestamp() }); showToast('Estado actualizado', 'success'); }
      catch (err) { showToast('Error: ' + err.message, 'error'); } finally { showLoading(false); }
    };

    window.markMaterial = async function(id, estado) {
      showLoading(true);
      try { await updateDoc(doc(db, 'materiales', id), { estado, actualizado: serverTimestamp() }); showToast('Estado actualizado', 'success'); }
      catch (err) { showToast('Error: ' + err.message, 'error'); } finally { showLoading(false); }
    };

    window.deleteItem = async function(type, id) {
      if (!confirm('¿Eliminar este registro permanentemente?')) return;
      showLoading(true);
      try { await deleteDoc(doc(db, type, id)); showToast('Eliminado correctamente', 'success'); }
      catch (err) { showToast('Error al eliminar: ' + err.message, 'error'); } finally { showLoading(false); }
    };

    window.closeModal = function() { document.getElementById('modalOverlay').classList.remove('active'); };
    window.closeModalOnOverlay = function(e) { if (e.target === e.currentTarget) closeModal(); };

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { success: '✅', error: '❌', info: 'ℹ️' };
      toast.innerHTML = `${icons[type] || '✅'} ${message}`;
      container.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 3000);
    }

    function showLoading(show) { 
      document.getElementById('loadingOverlay').classList.toggle('active', show); 
    }
  </script>
</body>
</html>
